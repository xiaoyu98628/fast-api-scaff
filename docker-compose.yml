services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: fast-api-scaff
    ports:
      - "${APP_PORT:-8000}:8000"
    command: sh -c "uvicorn public.main:app --host 0.0.0.0 --port 8000"
    networks:
      - app_net
    restart: unless-stopped

networks:
  app_net:
    name: fast-api-scaff-net
