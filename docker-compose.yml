services:
  service:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    container_name: ${APP_NAME}
    ports:
      - "${APP_PORT:-8000}:8000"
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    networks:
      - app_net

networks:
  app_net:
    name: fast-api-scaff
